<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center relative font-body-md overflow-hidden selection:bg-primary/30">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[80vw] max-w-[600px] h-[80vw] max-h-[600px] bg-primary/10 rounded-full blur-[100px] pointer-events-none md:blur-[140px]"></div>
<main class="w-full max-w-[420px] px-gutter relative z-10 flex flex-col items-center">
<div class="mb-10 text-primary opacity-80 flex flex-col items-center">
<span class="material-symbols-outlined text-[40px]" style="font-variation-settings: 'FILL' 0, 'wght' 200;">favorite</span>
</div>
<div class="w-full bg-[rgba(22,22,22,0.8)] backdrop-blur-[24px] rounded-2xl p-8 sm:p-10 shadow-[0_8px_32px_rgba(0,0,0,0.4)] border border-white/5 relative overflow-hidden group">
<div class="absolute inset-0 bg-gradient-to-br from-white/[0.04] to-transparent pointer-events-none"></div>
<h1 class="font-headline-md text-headline-md text-on-surface text-center mb-8 tracking-tight">Welcome back</h1>
<form class="space-y-5 relative z-10">
<div class="relative group/input">
<input class="floating-input w-full bg-surface-container rounded-[14px] px-4 pt-6 pb-2 text-on-surface border border-transparent focus:border-primary/30 focus:bg-surface-container-high transition-all outline-none placeholder-transparent font-body-md text-body-md shadow-inner" id="email" placeholder="Email address" type="email"/>
<label class="floating-label absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-body-sm text-body-sm transition-all duration-300 pointer-events-none origin-left" for="email">Email address</label>
<div class="absolute bottom-0 left-4 right-4 h-[1px] bg-primary scale-x-0 group-focus-within/input:scale-x-100 transition-transform duration-500 origin-center opacity-50"></div>
</div>
<div class="relative group/input">
<input class="floating-input w-full bg-surface-container rounded-[14px] px-4 pt-6 pb-2 text-on-surface border border-transparent focus:border-primary/30 focus:bg-surface-container-high transition-all outline-none placeholder-transparent font-body-md text-body-md shadow-inner" id="password" placeholder="Password" type="password"/>
<label class="floating-label absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-body-sm text-body-sm transition-all duration-300 pointer-events-none origin-left" for="password">Password</label>
<div class="absolute bottom-0 left-4 right-4 h-[1px] bg-primary scale-x-0 group-focus-within/input:scale-x-100 transition-transform duration-500 origin-center opacity-50"></div>
</div>
<div class="flex justify-end pt-2">
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors duration-300" href="#">Forgot password?</a>
</div>
<button class="w-full mt-10 py-4 rounded-full bg-gradient-to-r from-primary to-secondary text-on-primary font-label-caps text-label-caps tracking-[0.1em] shadow-[0_4px_20px_rgba(255,178,184,0.15)] hover:shadow-[0_4px_25px_rgba(255,178,184,0.3)] transition-all duration-300 active:scale-[0.98]" type="submit">
                    ENTER SANCTUARY
                </button>
</form>
<div class="mt-8 text-center relative z-10 pt-6 border-t border-white/5">
<p class="font-body-sm text-body-sm text-on-surface-variant">
