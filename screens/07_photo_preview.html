<style>
    /* Specific Glassmorphism borders as requested */
    .glass-card {
      background-color: rgba(22, 22, 22, 0.8);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid transparent;
      background-image: linear-gradient(rgba(22, 22, 22, 0.8), rgba(22, 22, 22, 0.8)), linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 100%);
      background-origin: border-box;
      background-clip: padding-box, border-box;
    }
    
    /* Input field glow */
    .input-glow:focus-within {
      box-shadow: 0 1px 0 0 var(--tw-colors-primary);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background h-screen w-screen overflow-hidden font-body-md text-body-md selection:bg-primary selection:text-on-primary">
<!-- Main App Canvas -->
<main class="relative w-full h-full max-w-[600px] mx-auto flex flex-col justify-end p-2 md:p-gutter">
<!-- Full Screen Photo Preview Background -->
<div class="absolute inset-0 md:inset-4 rounded-[2rem] md:rounded-[3rem] overflow-hidden shadow-[0_20px_60px_rgba(0,0,0,0.8)] z-0">
<img alt="Photo Preview" class="w-full h-full object-cover" data-alt="A cinematic, candid photograph of a couple sharing a quiet, intimate moment in a softly lit cafe. The lighting is moody and warm, emphasizing deep shadows and soft highlights consistent with a romantic, editorial dark-mode aesthetic. The color palette leans heavily into rich obsidian blacks and subtle warm tones, perfectly capturing a sense of privacy and connection." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCvCRAqmuRpkEfz1HoiHdiNbNCi1W3ShvZAfVeeKBVNpnC1jbFH8CbbAyAEaEnJ15KV9RCwjiQhBmSCEBtZBhsnLyKbTWLtCM-AoUk_IQb3J70MTzalSZMtG_K1cYhmxdQ4zEcZzEiGVwth8RGjauvPAkQeJ9tH7R0kFOefwfIh9xfjT20Ps_0dEW6YhUGJ9A2pyjoXRyCzV4l3sAubAYD8m2KmCVuIGOzSmyykxlRgucZdmm4Sb-vtPwJSXm_U-2OiN8ldmNqNVg"/>
<!-- Subtle top and bottom gradients for legibility of UI elements -->
<div class="absolute inset-0 bg-gradient-to-b from-black/60 via-transparent to-black/80 pointer-events-none"></div>
</div>
<!-- Top App Bar (Contextual/Transactional Override) -->
<header class="absolute top-6 left-6 right-6 md:top-12 md:left-12 md:right-12 flex justify-between items-center z-20">
<!-- Close Button -->
<button class="w-12 h-12 rounded-full bg-surface-container/30 backdrop-blur-xl border border-white/10 flex items-center justify-center text-on-surface hover:bg-surface-container/60 transition-all duration-300 shadow-lg">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
<!-- Edit Button -->
<button class="px-5 py-3 rounded-full bg-surface-container/30 backdrop-blur-xl border border-white/10 flex items-center gap-2 text-on-surface hover:bg-surface-container/60 transition-all duration-300 shadow-lg font-label-caps text-label-caps">
<span class="material-symbols-outlined text-[20px]">edit</span>
<span>EDIT</span>
</button>
</header>
<!-- Bottom Action Glass Panel -->
<section class="glass-card w-full rounded-[2rem] p-6 md:p-8 z-20 mb-4 md:mb-6 shadow-[0_0_20px_rgba(0,0,0,0.5)] flex flex-col gap-8 relative overflow-hidden">
<!-- Catchlight Effect inside the card -->
<div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-white/20 to-transparent"></div>
<!-- Quota Tracker -->
<div class="flex flex-col gap-3">
<div class="flex justify-between items-end">
<h3 class="font-label-caps text-label-caps text-on-surface-variant tracking-widest uppercase">Daily Quota</h3>
<span class="font-mono-timestamp text-mono-timestamp text-primary">3 of 5 photos used today</span>
</div>
<!-- Progress Pill -->
<div class="h-2 w-full bg-surface-container rounded-full overflow-hidden flex">
<div class="h-full w-[60%] bg-gradient-to-r from-primary to-secondary rounded-full drop-shadow-[0_0_10px_rgba(255,178,184,0.8)] relative">
<div class="absolute inset-0 bg-white/20 w-full animate-pulse rounded-full"></div>
</div>
</div>
</div>
<!-- Caption Input Field -->
<div class="relative input-glow transition-all duration-300">
<input class="w-full bg-transparent border-0 border-b border-surface-variant focus:border-primary focus:ring-0 text-on-surface placeholder:text-surface-variant/60 py-3 font-body-lg text-body-lg outline-none transition-colors" placeholder="Add a caption..." type="text"/>
</div>
<!-- Primary Action Button -->
<button class="w-full py-4 rounded-full bg-gradient-to-r from-primary to-secondary text-on-primary font-body-lg text-body-lg font-bold hover:brightness-110 active:scale-[0.98] transition-all duration-200 shadow-[0_8px_24px_rgba(255,178,184,0.25)] flex justify-center items-center gap-3">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">send</span>
<span>Send to Arjun</span>
</button>
</section>
</main>
</body></html>
